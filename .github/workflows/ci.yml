name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run lint

      - name: Run tests
        run: bun test --reporter=verbose

  build:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - target: macos-arm64
            runner: macos-latest
          - target: macos-x64
            runner: macos-13
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary (${{ matrix.target }})
        run: |
          mkdir -p dist
          if [ "${{ matrix.target }}" = "linux-arm64" ]; then
            bun build ./src/cli/index.ts --compile \
              --target=bun-linux-arm64 \
              --outfile=dist/qcp-${{ matrix.target }}
          elif [ "${{ matrix.target }}" = "linux-x64" ]; then
            bun build ./src/cli/index.ts --compile \
              --target=bun-linux-x64 \
              --outfile=dist/qcp-${{ matrix.target }}
          else
            bun build ./src/cli/index.ts --compile \
              --outfile=dist/qcp-${{ matrix.target }}
          fi
          chmod +x dist/qcp-${{ matrix.target }}

      - name: Smoke test binary
        run: dist/qcp-${{ matrix.target }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcp-${{ matrix.target }}
          path: dist/qcp-${{ matrix.target }}
          retention-days: 7
