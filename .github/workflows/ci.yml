name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]

# Explicitly limit repository permissions for security
permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Explicitly cache Bun's global cache directory across runs
      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Optimizing compute cost: run lint/typecheck only on Linux
      - name: Type check
        if: matrix.os == 'ubuntu-latest'
        run: bun run lint

      - name: Run tests
        run: bun test

  build:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: test
    # Evaluates correctly on both direct pushes and pull requests targeting main/release branches
    if: |
      github.ref_name == 'main' || 
      github.base_ref == 'main' || 
      startsWith(github.base_ref, 'release/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-latest
            bun_target: ""
          - target: linux-x64
            runner: ubuntu-latest
            bun_target: bun-linux-x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            bun_target: bun-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Reuse the cache configuration for the build runners
      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary (${{ matrix.target }})
        run: |
          mkdir -p dist

          if [ -n "${{ matrix.bun_target }}" ]; then
            bun build ./src/cli/index.ts --compile \
              --target=${{ matrix.bun_target }} \
              --outfile=dist/qcp-${{ matrix.target }}
          else
            bun build ./src/cli/index.ts --compile \
              --outfile=dist/qcp-${{ matrix.target }}
          fi

          chmod +x dist/qcp-${{ matrix.target }}

      - name: Smoke test binary
        run: dist/qcp-${{ matrix.target }} --version

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: qcp-${{ matrix.target }}
          path: dist/qcp-${{ matrix.target }}
          retention-days: 7