name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-latest
            bun_target: ""
            can_smoke_test: true
          - target: linux-x64
            runner: ubuntu-latest
            bun_target: "--target=bun-linux-x64"
            can_smoke_test: true
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            bun_target: "--target=bun-linux-arm64"
            can_smoke_test: true # Supported natively because it runs on an ARM runner
          - target: windows-x64
            runner: ubuntu-latest
            bun_target: "--target=bun-windows-x64"
            can_smoke_test: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          OUTFILE="dist/qcp-${{ matrix.target }}"

          if [ "${{ matrix.target }}" = "windows-x64" ]; then
            OUTFILE="${OUTFILE}.exe"
          fi

          bun build ./src/cli/index.ts --compile ${{ matrix.bun_target }} --outfile="$OUTFILE"

          if [ "${{ matrix.target }}" != "windows-x64" ]; then
            chmod +x "$OUTFILE"
          fi

      - name: Smoke test Unix binary
        if: matrix.can_smoke_test == true
        shell: bash
        run: |
          dist/qcp-${{ matrix.target }} --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: qcp-${{ matrix.target }}
          path: dist/qcp-${{ matrix.target }}*

  release:
    name: Create Release & Update Tap Formula
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/
          merge-multiple: true

      - name: Checkout Homebrew Tap Repo
        uses: actions/checkout@v7 # Note: Use v4 as v7 does not exist yet
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }} 
          path: 'tap-repo'

      - name: Compute Checksums and Update Remote Tap Formula
        shell: bash
        run: |
          # 1. Compute the checksums locally inside the dist folder
          cd dist
          sha256sum qcp-* > checksums.txt
          cat checksums.txt
          
          SHA_MAC_ARM64=$(sha256sum qcp-macos-arm64 | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum qcp-linux-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum qcp-linux-arm64 | awk '{print $1}')
          cd .. # Move back to workspace root

          # 2. Prepare the tap-repo directory and resolve detached HEAD
          cd tap-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fix the detached HEAD by tracking the remote main branch
          git fetch origin main
          git checkout main
          cd .. # Back to root to run sed safely

          # 3. Define path to the checked-out tap formula
          FORMULA_PATH="tap-repo/Formula/qcp.rb"
          
          if [ -f "$FORMULA_PATH" ]; then
            # 4. Smart Regex Replacement (Note: Mac runners might need sed -i '', but assuming Linux runner)
            sed -i "/qcp-macos-arm64/{n;s/sha256 \".*\"/sha256 \"${SHA_MAC_ARM64}\"/}" $FORMULA_PATH
            sed -i "/qcp-linux-x64/{n;s/sha256 \".*\"/sha256 \"${SHA_LINUX_X64}\"/}" $FORMULA_PATH
            sed -i "/qcp-linux-arm64/{n;s/sha256 \".*\"/sha256 \"${SHA_LINUX_ARM64}\"/}" $FORMULA_PATH
            
            # 5. Commit and push modifications safely
            cd tap-repo
            git add Formula/qcp.rb
            
            if ! git diff --cached --quiet; then
              git commit -m "chore: update qcp formula checksums for ${GITHUB_REF#refs/tags/}"
              git push origin main
            else
              echo "Formula checksums are already identical. Skipping commit."
            fi
            cd ..
          else
            echo "Error: Formula file not found at $FORMULA_PATH!"
            exit 1
          fi

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: qcp v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/qcp-macos-arm64
            dist/qcp-linux-x64
            dist/qcp-linux-arm64
            dist/qcp-windows-x64.exe
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for Node.js distribution
        run: |
          mkdir -p dist
          bun build ./src/cli/index.ts --target=node --outfile=dist/qcp.js
          head -1 dist/qcp.js | grep -q '#!/usr/bin/env node' || \
            (echo '#!/usr/bin/env node' | cat - dist/qcp.js > tmp && mv tmp dist/qcp.js)
          chmod +x dist/qcp.js

      - name: Publish to npm
        run: |
          # 1. Get the tag name from GITHUB_REF (e.g., v0.1.2-alpha.0 or v0.1.2)
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Processing tag: $TAG_NAME"

          # 2. Check if the tag contains 'alpha', 'beta', or 'rc'
          if [[ "$TAG_NAME" =~ alpha || "$TAG_NAME" =~ beta || "$TAG_NAME" =~ rc ]]; then
            echo "Pre-release detected. Setting npm tag to 'next'."
            NPM_TAG="next"
          else
            echo "Stable release detected. Setting npm tag to 'latest'."
            NPM_TAG="latest"
          fi

          # 3. Publish using the dynamic tag
          npm publish --access public --tag $NPM_TAG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}