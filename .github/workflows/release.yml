name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runner: macos-latest
            bun_target: ""
            can_smoke_test: true
          - target: linux-x64
            runner: ubuntu-latest
            bun_target: "--target=bun-linux-x64"
            can_smoke_test: true
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            bun_target: "--target=bun-linux-arm64"
            can_smoke_test: true # Supported natively because it runs on an ARM runner
          - target: windows-x64
            runner: ubuntu-latest
            bun_target: "--target=bun-windows-x64"
            can_smoke_test: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          OUTFILE="dist/qcp-${{ matrix.target }}"

          if [ "${{ matrix.target }}" = "windows-x64" ]; then
            OUTFILE="${OUTFILE}.exe"
          fi

          bun build ./src/cli/index.ts --compile ${{ matrix.bun_target }} --outfile="$OUTFILE"

          if [ "${{ matrix.target }}" != "windows-x64" ]; then
            chmod +x "$OUTFILE"
          fi

      - name: Smoke test Unix binary
        if: matrix.can_smoke_test == true
        shell: bash
        run: |
          dist/qcp-${{ matrix.target }} --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: qcp-${{ matrix.target }}
          path: dist/qcp-${{ matrix.target }}*

  release:
    name: Create Release & Update Tap Formula
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Checkout Homebrew Tap Repo
        uses: actions/checkout@v4
        with:
          repository: 'Moduna-AI/homebrew-qcp'
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }} # External PAT with write access to the tap repo
          path: 'tap-repo'

      - name: Compute Checksums and Update Remote Tap Formula
        shell: bash
        run: |
          # 1. Compute the checksums locally inside the dist folder
          cd dist
          sha256sum qcp-* > checksums.txt
          cat checksums.txt
          
          SHA_MAC_ARM64=$(sha256sum qcp-macos-arm64 | awk '{print $1}')
          SHA_LINUX_X64=$(sha256sum qcp-linux-x64 | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum qcp-linux-arm64 | awk '{print $1}')
          cd .. # Move back to workspace root

          # 2. Define path to the checked-out tap formula
          FORMULA_PATH="tap-repo/Formula/qcp.rb"
          
          if [ -f "$FORMULA_PATH" ]; then
            # 3. Use standard local shell variable substitution (safe from GH context errors)
            sed -i "s/PLACEHOLDER_SHA256_MACOS_ARM64/${SHA_MAC_ARM64}/g" $FORMULA_PATH
            sed -i "s/PLACEHOLDER_SHA256_LINUX_X64/${SHA_LINUX_X64}/g" $FORMULA_PATH
            sed -i "s/PLACEHOLDER_SHA256_LINUX_ARM64/${SHA_LINUX_ARM64}/g" $FORMULA_PATH
            
            # 4. Commit and push directly to the standalone tap repo
            cd tap-repo
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add Formula/qcp.rb
            git commit -m "chore: update qcp formula checksums for ${GITHUB_REF#refs/tags/}"
            git push origin main
            cd ..
          else
            echo "Error: Formula file not found at $FORMULA_PATH!"
            exit 1
          fi

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: qcp v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/qcp-macos-arm64
            dist/qcp-linux-x64
            dist/qcp-linux-arm64
            dist/qcp-windows-x64.exe
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for Node.js distribution
        run: |
          mkdir -p dist
          bun build ./src/cli/index.ts --target=node --outfile=dist/qcp.js
          head -1 dist/qcp.js | grep -q '#!/usr/bin/env node' || \
            (echo '#!/usr/bin/env node' | cat - dist/qcp.js > tmp && mv tmp dist/qcp.js)
          chmod +x dist/qcp.js

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}